name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    name: Backend Security, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarCloud analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        # npm ci enforces the lockfile and will fail if package.json and package-lock.json are out of sync
        run: npm ci

      - name: Check Code Formatting
        run: npm run format:check

      - name: Lint Code
        run: npm run lint

      - name: Security Vulnerability Scan (npm audit)
        # Scan for high/critical security vulnerabilities in dependencies
        run: npm audit --audit-level=high

      - name: Run Integration Tests
        # Run tests (pass if no tests defined or standard suite checks out)
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: mock_secret_key_for_testing_purposes_only
          DATABASE_URL: postgres://postgres:postgres_password@localhost:5432/test_db
          DB_SSL_REJECT_UNAUTHORIZED: false

      - name: SonarCloud Scan
        # Scan code quality & security via SonarCloud
        # Requires SONAR_TOKEN to be configured in GitHub Secrets
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./backend
