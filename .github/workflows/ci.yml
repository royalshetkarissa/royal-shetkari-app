name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    name: Backend Security, Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarCloud analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        # npm ci enforces the lockfile and will fail if package.json and package-lock.json are out of sync
        run: npm ci

      - name: Check Code Formatting
        run: npm run format:check

      - name: Lint Code
        run: npm run lint

      - name: Security Vulnerability Scan (npm audit)
        # Scan for high/critical security vulnerabilities in dependencies
        run: npm audit --audit-level=high

      - name: Run Integration Tests
        # Run tests (pass if no tests defined or standard suite checks out)
        run: npm test

      - name: SonarCloud Scan
        # Scan code quality & security via SonarCloud
        # Requires SONAR_TOKEN to be configured in GitHub Secrets
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./backend
